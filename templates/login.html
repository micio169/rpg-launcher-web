<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GM Authorization</title>
    <style>
        body {
            background-color: #0d0e12;
            color: #f3f4f6;
            font-family: system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: #161920;
            border: 1px solid #2a2f3d;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
        }
        h2 { margin: 0 0 24px 0; text-align: center; font-weight: 700; letter-spacing: -0.03em;}
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #9ca3af; font-size: 0.9rem;}
        input {
            width: 100%;
            padding: 12px;
            background-color: #0d0e12;
            border: 1px solid #2a2f3d;
            border-radius: 6px;
            color: white;
            box-sizing: border-box;
        }
        input:focus { border-color: #0070f3; outline: none; }
        .btn {
            width: 100%;
            padding: 12px;
            background: #0070f3;
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
        }
        .error { color: #ff4a4a; font-size: 0.85rem; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>GM Control Login</h2>
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">인증 및 진입</button>
            {% if error %}<div class="error">{{ error }}</div>{% endif %}
        </form>
    </div>
</body>
</html>
